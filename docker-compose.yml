services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/certbot:/var/www/certbot:ro
    depends_on:
      web:
        condition: service_healthy
      runtime:
        condition: service_started
      uptime-kuma:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://www.alreadyherellc.com}
      NEXT_PUBLIC_COMMAND_CENTER_URL: ${NEXT_PUBLIC_COMMAND_CENTER_URL:-https://app.alreadyherellc.com}
    expose:
      - "3000"
    depends_on:
      - runtime

  runtime:
    build:
      context: .
      dockerfile: Dockerfile.runtime
    restart: "no"
    env_file: .env
    expose:
      - "8080"
    volumes:
      - gmaos_data:/data
    command: ["python", "-m", "runtime.sovereign_core"]

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gmaos}
      POSTGRES_USER: ${POSTGRES_USER:-gmaos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-server-side}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    expose:
      - "5678"
    environment:
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_HIRING_BANNER_ENABLED: "false"
      N8N_HOST: ${N8N_HOST:-n8n.alreadyherellc.com}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-https}
      WEBHOOK_URL: ${N8N_PUBLIC_URL:-https://n8n.alreadyherellc.com}
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-change-me-server-side}
    volumes:
      - n8n_data:/home/node/.n8n

  uptime-kuma:
    image: louislam/uptime-kuma:1
    restart: unless-stopped
    expose:
      - "3001"
    volumes:
      - uptime_data:/app/data

  # ── ASI Engine (Asynchronous Stochastic Integration) ─────────────────────────
  asi-engine:
    image: python:3.11-slim
    container_name: asi_engine
    restart: unless-stopped
    working_dir: /app
    command: sh -c "pip install google-genai && python agents/asi_engine.py"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CLUSTER_SECRET=${CLUSTER_SECRET}
      - REDIS_ENDPOINT=redis://asi-cache:6379
      - ASI_AUTO_DEPLOY=${ASI_AUTO_DEPLOY:-false}
    volumes:
      - .:/app
    depends_on:
      - asi-cache

  asi-cache:
    image: redis:7-alpine
    container_name: asi_cache
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru
    volumes:
      - asi_redis_data:/data

  # ---- Video Engine (CUDA DAG) -----------------------------------------------
  video-engine:
    image: pytorch/pytorch:2.2.0-cuda12.1-cudnn8-runtime
    container_name: video_engine
    restart: unless-stopped
    working_dir: /app
    command: sh -c "pip install opencv-python-headless && python agents/video_engine.py"
    environment:
      - VIDEO_ENGINE_COMPILE=${VIDEO_ENGINE_COMPILE:-true}
      - VIDEO_TEMPORAL_STRIDE=${VIDEO_TEMPORAL_STRIDE:-10}
      - VIDEO_VARIANCE_THRESHOLD=${VIDEO_VARIANCE_THRESHOLD:-0.012}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video
    volumes:
      - .:/app
      - video_input:/input
      - video_output:/output
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, video]

volumes:
  video_input:
  video_output:
  caddy_data:
  caddy_config:
  gmaos_data:
  postgres_data:
  n8n_data:
  uptime_data:
