#cloud-config

package_update: true
package_upgrade: true

packages:
  - docker.io
  - docker-compose-plugin
  - git
  - curl
  - jq
  - ufw

runcmd:
  - systemctl enable --now docker
  - usermod -aG docker ubuntu

  # Firewall: allow SSH, HTTP, HTTPS only
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 22/tcp
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw --force enable

  # Clone repo and deploy
  - su - ubuntu -c "git clone --branch ${compose_branch} ${repo_url} /home/ubuntu/app"
  - su - ubuntu -c "cd /home/ubuntu/app && echo 'SITE_DOMAIN=${site_domain}' > .env"
  - su - ubuntu -c "cd /home/ubuntu/app && docker compose up -d --build"
