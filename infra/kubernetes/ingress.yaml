apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gmaos-ingress
  namespace: gmaos
  labels:
    app.kubernetes.io/part-of: gmaos
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/rate-limit: "30"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - alreadyherellc.com
        - www.alreadyherellc.com
      secretName: gmaos-tls
  rules:
    - host: alreadyherellc.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gmaos-web
                port:
                  name: http
    - host: www.alreadyherellc.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gmaos-web
                port:
                  name: http
