apiVersion: apps/v1
kind: Deployment
metadata:
  name: gmaos-web
  namespace: gmaos
  labels:
    app.kubernetes.io/name: gmaos-web
    app.kubernetes.io/part-of: gmaos
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gmaos-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gmaos-web
        app.kubernetes.io/part-of: gmaos
        app.kubernetes.io/component: frontend
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: web
          image: ghcr.io/quantam101/already-here-llc-web:latest
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: gmaos-config
            - secretRef:
                name: gmaos-secrets
                optional: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/dispatch
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/dispatch
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/dispatch
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
