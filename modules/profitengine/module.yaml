module:
  id: profitengine
  name: profitengine
  version: 1.0.0
  state: active
  cost_mode: api_spend
  enabled: true
  app_dir: profitengine/
  entry: profitengine/index.js
  ecosystem_config: ops/profitengine/ecosystem.config.cjs
  requires_approval_for:
    - external_write
    - paid_call
    - production_change
  healthcheck:
    path: /api/health
    port: 3000
  env_required:
    - GROQ_API_KEY
  env_optional:
    - GITHUB_TOKEN
    - GITHUB_REPO_OWNER
    - GITHUB_REPO_NAME
    - DEVTO_API_KEY
    - HASHNODE_TOKEN
    - MEDIUM_TOKEN
