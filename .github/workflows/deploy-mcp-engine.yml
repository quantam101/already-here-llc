name: Deploy MCP Trading Engine to Oracle VM

on:
  push:
    branches:
      - main
    paths:
      - 'runtime/mcp_trading_engine.py'
      - 'runtime/trading_orchestrator.py'
      - '.github/workflows/deploy-mcp-engine.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test SSH connectivity
        run: |
          nc -zv -w 10 ${{ secrets.ORACLE_VM_HOST }} 22 2>&1 || true
          ssh-keyscan -T 10 ${{ secrets.ORACLE_VM_HOST }} 2>&1 || true

      - name: Deploy MCP Engine to Oracle VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: opc
          key: ${{ secrets.ORACLE_SSH_KEY }}
          port: 22
          debug: true
          script: |
            set -e

            # Pull latest code
            if [ -d ~/already-here-llc ]; then
              cd ~/already-here-llc && git pull origin main
            else
              git clone https://github.com/quantam101/already-here-llc.git ~/already-here-llc
            fi

            cd ~/already-here-llc

            # Install Python dependencies
            if ! command -v pip3 &>/dev/null; then
              sudo dnf install -y python3-pip 2>/dev/null || sudo yum install -y python3-pip 2>/dev/null || sudo apt-get install -y python3-pip 2>/dev/null || true
            fi

            pip3 install --user fastapi httpx uvicorn[standard] numpy

            # Create .env for MCP engine if needed
            if [ ! -f runtime/.env ]; then
              cat > runtime/.env << 'ENVEOF'
            MCP_ENGINE_PORT=8000
            MCP_ACCOUNT_BALANCE=100.00
            MCP_MAX_DAILY_DRAWDOWN=6.00
            MCP_MAX_TRADE_VALUE=100.00
            MCP_BULL_STOP_MULT=0.995
            MCP_BULL_TP_MULT=1.035
            MCP_BEAR_STOP_MULT=1.005
            MCP_BEAR_TP_MULT=0.965
            MCP_MAX_RISK_PER_TRADE_PCT=0.02
            MCP_MIN_SIGNAL_SCORE=0.45
            MCP_SCALP_MODE=true
            MCP_CORS_ORIGINS=*
            MCP_AUDIT_LOG=./data/trade_audit.jsonl
            ENVEOF
            fi

            # Ensure PM2 is available
            if ! command -v pm2 &>/dev/null; then
              npm install -g pm2 2>/dev/null || sudo npm install -g pm2
            fi

            # Start or restart MCP engine
            if pm2 describe mcp-trading-engine > /dev/null 2>&1; then
              pm2 reload mcp-trading-engine --update-env
            else
              pm2 start "python3 -m uvicorn runtime.mcp_trading_engine:app --host 0.0.0.0 --port 8000" \
                --name mcp-trading-engine \
                --cwd ~/already-here-llc
            fi

            pm2 save

            # Verify health
            sleep 3
            curl -sf http://localhost:8000/healthz | grep '"status":"ok"'
            echo ""
            echo "MCP Trading Engine deployed successfully"
            echo "Access: http://$(curl -s ifconfig.me):8000"
