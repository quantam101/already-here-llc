name: SSH Recovery via Oracle Key

on:
  workflow_dispatch:

jobs:
  recover:
    runs-on: ubuntu-latest
    steps:
      - name: Add keys using ORACLE_SSH_KEY
        env:
          ORACLE_SSH_KEY: ${{ secrets.ORACLE_SSH_KEY }}
          ORACLE_VM_HOST: ${{ secrets.ORACLE_VM_HOST }}
        run: |
          HOST=${ORACLE_VM_HOST:-129.146.167.73}
          STEPHEN_KEY="ssh-rsa  oci_cmdos_oci-stephen"
          DEVIN_KEY="ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPp2I2ngE5QRsB9HyLbZCpxBwylhntz7IaElLbcto2FU devin-deploy-profitenginev5"

          echo "Host: $HOST"

          # Try raw key
          echo "$ORACLE_SSH_KEY" > /tmp/oracle_key && chmod 600 /tmp/oracle_key
          echo "Key type: $(file /tmp/oracle_key)"
          echo "Fingerprint: $(ssh-keygen -l -f /tmp/oracle_key 2>&1)"

          if ssh -o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectTimeout=10 -i /tmp/oracle_key ubuntu@$HOST "echo SSH_OK" 2>&1; then
            echo "=== SUCCESS with ORACLE_SSH_KEY ==="
            ssh -o StrictHostKeyChecking=no -o BatchMode=yes -i /tmp/oracle_key ubuntu@$HOST "
              mkdir -p ~/.ssh && chmod 700 ~/.ssh
              echo '$STEPHEN_KEY' >> ~/.ssh/authorized_keys
              echo '$DEVIN_KEY' >> ~/.ssh/authorized_keys
              sort -u ~/.ssh/authorized_keys -o ~/.ssh/authorized_keys
              chmod 600 ~/.ssh/authorized_keys
              echo KEYS_ADDED
              wc -l ~/.ssh/authorized_keys
              cat ~/.ssh/authorized_keys
            "
            exit 0
          fi

          # Try base64-decoded
          echo "$ORACLE_SSH_KEY" | tr -d '[:space:]' | base64 -d > /tmp/oracle_b64 2>/dev/null && chmod 600 /tmp/oracle_b64
          if [ -s /tmp/oracle_b64 ]; then
            echo "Trying base64-decoded key..."
            echo "Decoded type: $(file /tmp/oracle_b64)"
            if ssh -o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectTimeout=10 -i /tmp/oracle_b64 ubuntu@$HOST "echo SSH_OK" 2>&1; then
              echo "=== SUCCESS with decoded ORACLE_SSH_KEY ==="
              ssh -o StrictHostKeyChecking=no -o BatchMode=yes -i /tmp/oracle_b64 ubuntu@$HOST "
                mkdir -p ~/.ssh && chmod 700 ~/.ssh
                echo '$STEPHEN_KEY' >> ~/.ssh/authorized_keys
                echo '$DEVIN_KEY' >> ~/.ssh/authorized_keys
                sort -u ~/.ssh/authorized_keys -o ~/.ssh/authorized_keys
                chmod 600 ~/.ssh/authorized_keys
                echo KEYS_ADDED && wc -l ~/.ssh/authorized_keys && cat ~/.ssh/authorized_keys
              "
              exit 0
            fi
          fi

          echo "ORACLE_SSH_KEY failed. Auth methods check:"
          ssh -v -o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectTimeout=10 -i /tmp/oracle_key ubuntu@$HOST "echo ok" 2>&1 | grep -E "Trying|Permission|method"
          exit 1