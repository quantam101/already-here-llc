name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
  ZAPIER_WEBHOOK_URL: ${{ secrets.ZAPIER_WEBHOOK_URL }}

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --silent

      - name: Lint
        shell: bash
        run: |
          set +e
          npm run lint --if-present 2>&1 | tee eslint-output.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            echo "::group::eslint failure summary"
            tail -n 160 eslint-output.log
            echo "::endgroup::"
          fi
          exit "$status"

      - name: Upload lint diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: eslint-output
          path: eslint-output.log
          if-no-files-found: ignore

      - name: Typecheck
        run: npm run typecheck --if-present

      - name: Build
        run: npm run build --if-present

      - name: Test
        run: npm run test --if-present

      - name: Content guard
        run: npm run qa:content --if-present

      - name: SEO route audit
        run: npm run qa:seo --if-present

      - name: Quality gate
        run: npm run qa:gate --if-present

      - name: Notify Slack/Zapier
        if: always()
        env:
          ALERT_TITLE: Already Here LLC CI ${{ job.status }}
          ALERT_STATUS: ${{ job.status }}
          ALERT_PRIORITY: ${{ job.status == 'failure' && 'high' || 'normal' }}
          ALERT_GRADE: ${{ job.status == 'failure' && 'A-action-required' || 'B-monitor' }}
          ALERT_SUMMARY: CI completed with status `${{ job.status }}` for `${{ github.repository }}` on `${{ github.ref_name }}`.
          ALERT_ACTION: ${{ job.status == 'failure' && 'Review failed GitHub Actions logs, fix blockers, and rerun validation before treating automation as live.' || 'No blocking action required unless this run was expected to release revenue automation.' }}
          ALERT_SOURCE_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ALERT_SOURCE: github-actions-ci
        run: node scripts/notify-dispatch-alert.mjs
