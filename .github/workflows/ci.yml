name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Typecheck
        run: npm run typecheck --if-present

      - name: Build
        run: npm run build --if-present

      - name: Test
        run: npm run test --if-present

      - name: Content guard
        run: npm run qa:content --if-present

      - name: SEO route audit
        run: npm run qa:seo --if-present

      - name: Quality gate
        run: npm run qa:gate --if-present
