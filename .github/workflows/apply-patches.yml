name: Apply Repository Patches

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout with PAT
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT_WRITE }}

      - name: Configure Git
        run: |
          git config user.name "Already Here Patch Bot"
          git config user.email "dispatch@alreadyherellc.com"

      - name: Apply patches
        run: node apply-patches.js

      - name: Commit and push
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "apply site text patches"
            git push
          fi
