name: Deploy ProfitEngine to Oracle VM

on:
  push:
    branches:
      - main
    paths:
      - 'profitengine/**'
      - 'ops/profitengine/**'
      - '.github/workflows/deploy-profitengine.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Test SSH connectivity
        run: |
          nc -zv -w 10 ${{ secrets.ORACLE_VM_HOST }} 22 2>&1 || true
          ssh-keyscan -T 10 ${{ secrets.ORACLE_VM_HOST }} 2>&1 || true

      - name: Deploy to Oracle VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: opc
          key: ${{ secrets.ORACLE_SSH_KEY }}
          port: 22
          debug: true
          script: |
            set -e

            # Pull latest code
            if [ -d ~/already-here-llc ]; then
              cd ~/already-here-llc && git pull origin main
            else
              git clone https://github.com/quantam101/already-here-llc.git ~/already-here-llc
            fi

            cd ~/already-here-llc/profitengine

            # Install production dependencies
            npm install --omit=dev

            # Create .env if missing; never overwrite existing keys
            if [ ! -f .env ]; then
              cp .env.example .env
              echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> .env
              echo "CONTENT_OUTPUT_DIR=../content/blog" >> .env
            fi

            # Ensure PM2 is available
            if ! command -v pm2 &>/dev/null; then
              npm install -g pm2
            fi

            # Restart or start via ecosystem config
            if pm2 describe profitengine > /dev/null 2>&1; then
              pm2 reload profitengine --update-env
            else
              pm2 start ../ops/profitengine/ecosystem.config.cjs
            fi

            pm2 save

            # Verify health
            sleep 3
            curl -sf http://localhost:3000/api/health | grep '"status":"healthy"'
            echo "Deploy complete"
